services:

  ras-web:
    image: nginx:1.27-alpine
    container_name: ras-web
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./config/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      ras-api:
        condition: service_healthy

  ras-api:
    build: ./backend
    container_name: ras-api
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DATA_FILE=/data/links.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/links')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 8s
