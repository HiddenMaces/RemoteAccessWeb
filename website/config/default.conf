map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mischa.hiddenmaces.nl;
    server_name asterix.ddn.lan;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/mischa.hiddenmaces.nl.crt;
    ssl_certificate_key /etc/nginx/certs/mischa.hiddenmaces.nl.key;

    ssl_client_certificate /etc/nginx/certs/rootCA.crt;
    ssl_verify_client on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Static frontend
    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }

    # CRUD API → Flask backend
    location /api/ {
        proxy_pass         http://ras-api:5000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Guacamole reverse proxy
    location /guacamole/ {
        proxy_pass         http://guacamole:8080/guacamole/;
        proxy_buffering    off;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log         off;
    }

    error_page 495 496 497 =403 /403error.html;
    error_page 404 /404error.html;

    location = /403error.html { root /usr/share/nginx/html; internal; }
    location = /404error.html { root /usr/share/nginx/html; internal; }
}
