<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Gateway...</title>
    <style>
        :root {
            --bg-dark: #0b0b15;
            --bg-panel: #151525;
            --accent-purple: #6816f0;
            --text-white: #ffffff;
            --text-gray: #aeb4b9;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: var(--font-main);
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }
        
        /* Header */
        .hero {
            width: 100%; text-align: center; padding: 80px 20px;
            background: radial-gradient(circle at top center, #2a1b4e 0%, var(--bg-dark) 70%);
            border-bottom: 1px solid #2d2d45;
        }
        /* Added ID for JS targeting */
        .hero h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
        .hero p { color: var(--text-gray); font-size: 1.2rem; margin-top: 15px; }

        /* Grid */
        .container {
            max-width: 1000px; width: 100%; padding: 60px 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .link-card {
            background-color: var(--bg-panel);
            border: 1px solid #2d2d45;
            padding: 25px; border-radius: 4px;
            text-decoration: none; color: var(--text-white);
            transition: all 0.3s ease;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
        }
        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .link-card::before {
            content: ''; position: absolute; left: 0; top: 0;
            height: 100%; width: 4px; background-color: var(--accent-purple);
            opacity: 0; transition: opacity 0.3s;
        }
        .link-card:hover::before { opacity: 1; }
        .arrow { color: var(--accent-purple); font-weight: bold; }

        /* Footer */
        footer {
            margin-top: auto; 
            padding: 30px;
            color: var(--text-gray);
            font-size: 0.9rem;
            text-align: center;
            border-top: 1px solid #2d2d45;
            width: 100%;
            box-sizing: border-box;
        }
        
        .footer-link {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link:hover { text-decoration: underline; }

        /* Edit Icon */
        .edit-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            color: var(--text-gray);
        }
        .edit-icon:hover {
            opacity: 1;
            color: var(--accent-purple);
        }
        .link-card {
            position: relative;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background-color: var(--bg-panel);
            margin: 10% auto;
            padding: 30px;
            border: 1px solid #2d2d45;
            border-radius: 4px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            color: var(--text-white);
            font-size: 1.5rem;
            margin: 0;
        }
        .close-btn {
            color: var(--text-gray);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }
        .close-btn:hover {
            color: var(--text-white);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-gray);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-dark);
            border: 1px solid #2d2d45;
            border-radius: 4px;
            color: var(--text-white);
            font-family: var(--font-main);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 600;
        }
        .btn-primary {
            background-color: var(--accent-purple);
            color: var(--text-white);
        }
        .btn-primary:hover {
            background-color: #5a12d0;
        }
        .btn-secondary {
            background-color: #2d2d45;
            color: var(--text-white);
        }
        .btn-secondary:hover {
            background-color: #3d3d55;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="page-title">Operational Gateway</h1>
        <p>Secure Proxy & Access Point. Systems Normal.</p>
        <button class="btn btn-primary" onclick="openAddModal()" style="margin-top: 20px;">+ Add New Link</button>
    </div>

    <div class="container" id="button-container">
        </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Edit Link</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="form-group">
                <label for="editTitle">Title:</label>
                <input type="text" id="editTitle" placeholder="Enter link title">
            </div>
            <div class="form-group">
                <label for="editUrl">URL:</label>
                <input type="text" id="editUrl" placeholder="Enter link URL">
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveLink()">Save</button>
                <button id="deleteBtn" class="btn btn-secondary" onclick="deleteLink()" style="display: none;">Delete</button>
            </div>
        </div>
    </div>

    <footer>
        System v1.3 | Contact Support: <a id="dynamic-email" class="footer-link" href="#">Loading...</a>
    </footer>

    <script>
        let linksData = [];
        let currentEditIndex = -1;

        fetch('links.txt')
            .then(response => response.text())
            .then(text => {
                const container = document.getElementById('button-container');
                const lines = text.split('\n');

                lines.forEach((line, index) => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;

                    // 1. Check for TITLE (Updates Tab Name AND Page Header)
                    if (cleanLine.startsWith('title=')) {
                        const newTitle = cleanLine.replace('title=', '').trim();
                        
                        // Set Browser Tab
                        document.title = newTitle;
                        
                        // Set Page H1
                        const h1 = document.getElementById('page-title');
                        if (h1) h1.innerText = newTitle;
                        
                        return;
                    }

                    // 2. Check for EMAIL
                    if (cleanLine.startsWith('email=')) {
                        const email = cleanLine.replace('email=', '').trim();
                        const emailEl = document.getElementById('dynamic-email');
                        if (emailEl) {
                            emailEl.innerText = email;
                            emailEl.href = 'mailto:' + email;
                        }
                        return;
                    }

                    // 3. Render BUTTONS
                    const parts = cleanLine.split(',');
                    if (parts.length >= 2) {
                        const title = parts[0].trim();
                        const url = parts[1].trim();

                        if (title && url) {
                            // Store link data with original line number
                            linksData.push({
                                index: index,
                                title: title,
                                url: url,
                                originalLine: line
                            });

                            const a = document.createElement('a');
                            a.className = 'link-card';
                            a.href = url;
                            if(url.startsWith('http')) { a.target = "_blank"; }

                            a.innerHTML = `
                                <span class="link-title">${title}</span>
                                <span class="arrow">→</span>
                                <svg class="edit-icon" onclick="openEditModal(${linksData.length - 1})" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                                </svg>
                            `;
                            container.appendChild(a);
                        }
                    }
                });
            })
            .catch(err => console.error('Error loading links:', err));

        function openEditModal(linkIndex) {
            currentEditIndex = linkIndex;
            const link = linksData[linkIndex];
            
            document.getElementById('editTitle').value = link.title;
            document.getElementById('editUrl').value = link.url;
            document.getElementById('modalTitle').innerText = 'Edit Link';
            document.getElementById('deleteBtn').style.display = 'inline-block';
            document.getElementById('editModal').style.display = 'block';
        }

        function openAddModal() {
            currentEditIndex = -1;
            document.getElementById('editTitle').value = '';
            document.getElementById('editUrl').value = '';
            document.getElementById('modalTitle').innerText = 'Add New Link';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditIndex = -1;
        }

        function saveLink() {
            const newTitle = document.getElementById('editTitle').value.trim();
            const newUrl = document.getElementById('editUrl').value.trim();
            
            if (!newTitle || !newUrl) {
                alert('Please enter both title and URL');
                return;
            }
            
            if (currentEditIndex === -1) {
                // Add new link
                addNewLink(newTitle, newUrl);
            } else {
                // Update existing link
                updateLinksFile(currentEditIndex, newTitle, newUrl);
            }
            closeEditModal();
        }

        function deleteLink() {
            if (currentEditIndex === -1) return;
            
            if (confirm('Are you sure you want to delete this link?')) {
                deleteLinkFromFile(currentEditIndex);
                closeEditModal();
            }
        }

        function addNewLink(title, url) {
            fetch('links.txt')
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    
                    // Add new line at the end (before empty lines)
                    let insertIndex = lines.length;
                    for (let i = lines.length - 1; i >= 0; i--) {
                        if (lines[i].trim() !== '') {
                            insertIndex = i + 1;
                            break;
                        }
                    }
                    
                    lines.splice(insertIndex, 0, `${title},${url}`);
                    
                    // Write back to file
                    const updatedText = lines.join('\n');
                    writeLinksFile(updatedText);
                })
                .catch(err => console.error('Error adding link:', err));
        }

        function updateLinksFile(linkIndex, newTitle, newUrl) {
            fetch('links.txt')
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    const link = linksData[linkIndex];
                    
                    // Update the specific line
                    lines[link.index] = `${newTitle},${newUrl}`;
                    
                    // Write back to file
                    const updatedText = lines.join('\n');
                    writeLinksFile(updatedText);
                })
                .catch(err => console.error('Error updating links:', err));
        }

        function deleteLinkFromFile(linkIndex) {
            fetch('links.txt')
                .then(response => response.text())
                .then(text => {
                    const lines = text.split('\n');
                    const link = linksData[linkIndex];
                    
                    // Remove the specific line
                    lines.splice(link.index, 1);
                    
                    // Write back to file
                    const updatedText = lines.join('\n');
                    writeLinksFile(updatedText);
                })
                .catch(err => console.error('Error deleting link:', err));
        }

        function writeLinksFile(content) {
            // Since we can't directly write files from browser JavaScript,
            // we'll create a download and instruct the user to replace the file
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'links.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('Updated links.txt has been downloaded. Please replace the original file and refresh the page to see changes.');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
