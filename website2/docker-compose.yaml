version: '3.8'

services:
  link-manager:
    build: .
    container_name: link-manager
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./links.json:/app/links.json
    working_dir: /app

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - link-manager

networks:
  default:
    driver: bridge
