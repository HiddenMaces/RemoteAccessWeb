<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Manager</title>
    <style>
        :root {
            --bg-dark: #0b0b15;
            --bg-panel: #151525;
            --accent-purple: #6816f0;
            --text-white: #ffffff;
            --text-gray: #aeb4b9;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: var(--font-main);
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }
        
        /* Header */
        .hero {
            width: 100%; text-align: center; padding: 60px 20px;
            background: radial-gradient(circle at top center, #2a1b4e 0%, var(--bg-dark) 70%);
            border-bottom: 1px solid #2d2d45;
        }
        .hero h1 { font-size: 3rem; margin: 0; letter-spacing: -1px; }
        .hero p { color: var(--text-gray); font-size: 1.2rem; margin-top: 15px; }

        /* Add Button */
        .add-btn {
            background-color: var(--accent-purple);
            color: var(--text-white);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 600;
            font-size: 1rem;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .add-btn:hover {
            background-color: #5a12d0;
        }

        /* Grid */
        .container {
            max-width: 1000px; width: 100%; padding: 40px 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .link-card {
            background-color: var(--bg-panel);
            border: 1px solid #2d2d45;
            padding: 20px; border-radius: 4px;
            text-decoration: none; color: var(--text-white);
            transition: all 0.3s ease;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-purple);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .link-card::before {
            content: ''; position: absolute; left: 0; top: 0;
            height: 100%; width: 4px; background-color: var(--accent-purple);
            opacity: 0; transition: opacity 0.3s;
        }
        .link-card:hover::before { opacity: 1; }

        .link-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .link-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            flex: 1;
        }

        .link-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 3px;
            transition: background-color 0.3s;
            color: var(--text-gray);
        }
        .action-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: var(--text-white);
        }

        .link-url {
            color: var(--text-gray);
            font-size: 0.9rem;
            word-break: break-all;
            margin: 5px 0;
        }

        .link-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-gray);
        }

        .new-tab-badge {
            background-color: var(--accent-purple);
            color: var(--text-white);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background-color: var(--bg-panel);
            margin: 10% auto;
            padding: 30px;
            border: 1px solid #2d2d45;
            border-radius: 4px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            color: var(--text-white);
            font-size: 1.5rem;
            margin: 0;
        }
        .close-btn {
            color: var(--text-gray);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }
        .close-btn:hover {
            color: var(--text-white);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-gray);
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-dark);
            border: 1px solid #2d2d45;
            border-radius: 4px;
            color: var(--text-white);
            font-family: var(--font-main);
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-purple);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-purple);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 600;
        }
        .btn-primary {
            background-color: var(--accent-purple);
            color: var(--text-white);
        }
        .btn-primary:hover {
            background-color: #5a12d0;
        }
        .btn-secondary {
            background-color: #2d2d45;
            color: var(--text-white);
        }
        .btn-secondary:hover {
            background-color: #3d3d55;
        }
        .btn-danger {
            background-color: #d32f2f;
            color: var(--text-white);
        }
        .btn-danger:hover {
            background-color: #b71c1c;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Link Manager</h1>
        <p>Manage your proxy links and connections</p>
        <button class="add-btn" onclick="openAddModal()">+ Add New Link</button>
    </div>

    <div class="container" id="links-container">
        <!-- Links will be loaded here -->
    </div>

    <!-- Link Modal -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Add Link</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="linkForm">
                <div class="form-group">
                    <label for="linkTitle">Title:</label>
                    <input type="text" id="linkTitle" required placeholder="Enter link title">
                </div>
                <div class="form-group">
                    <label for="linkUrl">URL:</label>
                    <input type="text" id="linkUrl" required placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="newTab">
                        <label for="newTab">Open in new tab</label>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteLink()" style="display: none;">Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentEditId = null;

        // Load links from API
        async function loadLinks() {
            try {
                const response = await fetch('/api/links');
                const links = await response.json();
                renderLinks(links);
            } catch (error) {
                console.error('Error loading links:', error);
            }
        }

        // Render links in the container
        function renderLinks(links) {
            const container = document.getElementById('links-container');
            container.innerHTML = '';

            links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'link-card';
                
                card.innerHTML = `
                    <div class="link-header">
                        <h3 class="link-title">${link.title}</h3>
                        <div class="link-actions">
                            <button class="action-btn" onclick="editLink(${link.id})" title="Edit">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                                </svg>
                            </button>
                            <button class="action-btn" onclick="quickDeleteLink(${link.id})" title="Delete">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="link-url">${link.url}</div>
                    <div class="link-meta">
                        ${link.newTab ? '<span class="new-tab-badge">New Tab</span>' : ''}
                        <span>Created: ${new Date(link.createdAt).toLocaleDateString()}</span>
                    </div>
                `;
                
                // Add click handler for the card (excluding action buttons)
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.link-actions')) {
                        window.open(link.url, link.newTab ? '_blank' : '_self');
                    }
                });
                
                container.appendChild(card);
            });
        }

        // Open add modal
        function openAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Add Link';
            document.getElementById('linkForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('linkModal').style.display = 'block';
        }

        // Edit link
        async function editLink(id) {
            try {
                const response = await fetch('/api/links');
                const links = await response.json();
                const link = links.find(l => l.id === id);
                
                if (link) {
                    currentEditId = id;
                    document.getElementById('modalTitle').textContent = 'Edit Link';
                    document.getElementById('linkTitle').value = link.title;
                    document.getElementById('linkUrl').value = link.url;
                    document.getElementById('newTab').checked = link.newTab;
                    document.getElementById('deleteBtn').style.display = 'inline-block';
                    document.getElementById('linkModal').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading link:', error);
            }
        }

        // Quick delete link
        async function quickDeleteLink(id) {
            if (confirm('Are you sure you want to delete this link?')) {
                try {
                    await fetch(`/api/links/${id}`, { method: 'DELETE' });
                    loadLinks();
                } catch (error) {
                    console.error('Error deleting link:', error);
                }
            }
        }

        // Delete link from modal
        async function deleteLink() {
            if (currentEditId && confirm('Are you sure you want to delete this link?')) {
                try {
                    await fetch(`/api/links/${currentEditId}`, { method: 'DELETE' });
                    closeModal();
                    loadLinks();
                } catch (error) {
                    console.error('Error deleting link:', error);
                }
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('linkModal').style.display = 'none';
            currentEditId = null;
        }

        // Handle form submission
        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            const newTab = document.getElementById('newTab').checked;
            
            if (!title || !url) {
                alert('Please fill in all required fields');
                return;
            }
            
            try {
                if (currentEditId) {
                    // Update existing link
                    await fetch(`/api/links/${currentEditId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, url, newTab })
                    });
                } else {
                    // Add new link
                    await fetch('/api/links', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, url, newTab })
                    });
                }
                
                closeModal();
                loadLinks();
            } catch (error) {
                console.error('Error saving link:', error);
            }
        });

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('linkModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Load links on page load
        loadLinks();
    </script>
</body>
</html>
